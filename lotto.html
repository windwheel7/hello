<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로또 6/45</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 60px;
    }
    .balls {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 30px;
    }
    .ball {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
    }
    /* 번호 구간별 색상 (실제 로또 규칙) */
    .c1 { background: #fbc400; }  /* 1~10  노랑 */
    .c2 { background: #69c8f2; }  /* 11~20 파랑 */
    .c3 { background: #ff7272; }  /* 21~30 빨강 */
    .c4 { background: #aaaaaa; }  /* 31~40 회색 */
    .c5 { background: #b0d840; }  /* 41~45 초록 */
  </style>
</head>
<body>
  <h1>로또 6/45 번호 추첨</h1>
  <p>새로고침하면 새 번호가 나옵니다</p>
  <div class="balls" id="balls"></div>

  <script>
    function drawLotto() {
      const pool = [];
      for (let i = 1; i <= 45; i++) pool.push(i);

      const picked = [];
      for (let n = 0; n < 6; n++) {
        const idx = Math.floor(Math.random() * pool.length);
        picked.push(pool[idx]);
        pool.splice(idx, 1);   // 뽑은 숫자는 제거 (중복 방지)
      }
      picked.sort((a, b) => a - b);
      return picked;
    }

    function colorClass(num) {
      if (num <= 10) return "c1";
      if (num <= 20) return "c2";
      if (num <= 30) return "c3";
      if (num <= 40) return "c4";
      return "c5";
    }

    const numbers = drawLotto();
    const container = document.getElementById("balls");
    numbers.forEach(num => {
      const ball = document.createElement("div");
      ball.className = "ball " + colorClass(num);
      ball.textContent = num;
      container.appendChild(ball);
    });
  </script>
</body>
</html>
